<div class="tasks-grid">
  <lb-tasks-list [tasks]="todoTasks()" [status]="statusEnum.Todo" (delete)="onDeleteTask($event)" />
  <lb-tasks-list
    [tasks]="inProgressTasks()"
    [status]="statusEnum.InProgress"
    (delete)="onDeleteTask($event)"
  />
  <lb-tasks-list [tasks]="doneTasks()" [status]="statusEnum.Done" (delete)="onDeleteTask($event)" />
</div>

<p-confirmDialog />
