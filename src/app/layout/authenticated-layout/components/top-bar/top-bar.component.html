<header class="top-bar">
  <div class="flex">
    <button
      type="button"
      class="md:hidden flex items-center justify-center w-9 h-9 rounded-lg hover:bg-gray-100 transition-colors shrink-0"
      (click)="toggleMenu()"
      [attr.aria-label]="menuService.isOpen() ? 'Close navigation menu' : 'Open navigation menu'"
      [attr.aria-expanded]="menuService.isOpen()"
      aria-controls="side-menu"
    >
      @if (menuService.isOpen()) {
        <span class="text-xl leading-none">✕</span>
      } @else {
        <span class="text-xl leading-none">☰</span>
      }
    </button>

    <div class="top-bar__brand">
      <div class="top-bar__logo" aria-hidden="true">
        <span class="top-bar__logo-inner"></span>
      </div>
      <span class="top-bar__app-name">Task Manager</span>
    </div>
  </div>

  <div class="top-bar__search">
    <input
      type="search"
      class="top-bar__search-input"
      [attr.aria-label]="'layout.search_tasks' | translate"
      [placeholder]="'🔍 ' + ('layout.search_tasks' | translate)"
      (input)="onSearch($event)"
    />
  </div>

  <div class="top-bar__actions">
    <button
      type="button "
      class="top-bar__lang-btn"
      (click)="toggleLanguage()"
      class="bordered"
      [title]="currentLang() === 'en' ? 'التغيير للعربية' : 'Switch to English'"
    >
      {{ currentLang() === 'en' ? 'AR' : 'EN' }}
    </button>

    <button class="button-outline" type="button" aria-label="Notifications">🔔</button>

    <div class="avatar" aria-label="User: John Doe">JD</div>
  </div>
</header>
