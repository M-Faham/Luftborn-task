<!-- Mobile backdrop -->
@if (menuService.isOpen()) {
  <div
    class="fixed inset-0 bg-black/40 z-10 md:hidden"
    (click)="menuService.close()"
    aria-hidden="true"
  ></div>
}

<aside
  id="side-menu"
  class="side-menu"
  [class.side-menu--open]="menuService.isOpen()"
  aria-label="Main navigation"
>
  <nav class="side-menu__nav" aria-label="Pages">
    @for (item of menuItems; track item.label) {
      <a
        class="side-menu__item"
        [routerLink]="item.disabled ? null : item.route"
        routerLinkActive="side-menu__item--active"
        [ngClass]="{ disabled: item.disabled }"
        [attr.aria-disabled]="item.disabled ? 'true' : null"
        [attr.tabindex]="item.disabled ? -1 : null"
        (click)="menuService.close()"
      >
        <span class="side-menu__icon" aria-hidden="true">{{ item.icon }}</span>
        <span class="side-menu__label">{{ item.label | translate }}</span>
      </a>
    }
  </nav>

  <div class="side-menu__footer">
    <button class="w-full create_button side-menu__new-task" (click)="onNewTask()">
      + {{ 'sideMenu.newTask' | translate }}
    </button>
  </div>
</aside>
